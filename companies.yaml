companies:
  # --- The Workday Giants ---
  # Optional: enabled: false skips a row (broken ATS slug or company moved portals).
  - name: NVIDIA
    ats: workday
    tenant_url: "https://nvidia.wd5.myworkdayjobs.com/wday/cxs/nvidia/NVIDIAExternalCareerSite/jobs"
    portal_base: "https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite"
    workday_enrich_job_details: true
    workday_enrich_max: 650
  # Supplementary Indeed search — catches NVIDIA intern/new-grad reqs that may appear on Indeed with different phrasing.
  - name: NVIDIA
    ats: jobspy
    jobspy_queries:
      - "NVIDIA hardware intern"
      - "NVIDIA ASIC design intern"
      - "NVIDIA verification intern"
      - "NVIDIA GPU hardware intern"
      - "NVIDIA RTL design new grad"
      - "NVIDIA hardware engineer new grad"
      - "NVIDIA ASIC verification engineer"
  - name: Cisco
    ats: workday
    tenant_url: "https://cisco.wd5.myworkdayjobs.com/wday/cxs/cisco/Cisco_Careers/jobs"
    portal_base: "https://cisco.wd5.myworkdayjobs.com/Cisco_Careers"
  # Ericsson’s site (jobs.ericsson.com) is Eightfold PCS — public JSON often blocks non-browser clients.
  # JobSpy/Indeed is a partial mirror for hardware/ASIC roles.
  - name: Ericsson
    ats: jobspy
    jobspy_queries:
      - "Ericsson ASIC design engineer"
      - "Ericsson hardware engineer"
      - "Ericsson RTL design engineer"
      - "Ericsson design verification engineer"
      - "Ericsson silicon"
      - "Ericsson FPGA"
  # Microsoft careers are not on a single Workday slug the bot can call reliably; Indeed mirror.
  - name: Microsoft
    ats: jobspy
    jobspy_queries:
      - "Microsoft silicon engineer"
      - "Microsoft hardware engineer"
      - "Microsoft RTL design"
      - "Microsoft ASIC verification"
      - "Microsoft Azure hardware"
  # https://careers.smartrecruiters.com/Solidigm — public Posting API.
  - name: Solidigm
    ats: smartrecruiters
    smartrecruiters_company: Solidigm
  # Nokia uses Taleo/oracle for apply; JobSpy catches silicon-adjacent postings on Indeed.
  - name: Nokia
    ats: jobspy
    jobspy_queries:
      - "Nokia ASIC engineer"
      - "Nokia hardware design engineer"
      - "Nokia RTL engineer"
      - "Nokia verification engineer"
      - "Nokia silicon"
  # AMD’s official site is Jibe (careers.amd.com), not Workday. JobSpy searches Indeed as a partial mirror;
  # some reqs never appear on Indeed or use different titles.
  - name: AMD
    ats: jobspy
    jobspy_queries:
      - "AMD RTL design intern"
      - "AMD hardware verification intern"
      - "AMD CPU architecture intern"
      - "AMD GPU hardware intern"
      - "AMD performance modeling intern"
      - "AMD RTL design new grad"
      - "AMD hardware engineer new grad"
      - "AMD CPU design engineer"
      - "AMD GPU design engineer"
      - "AMD hardware verification engineer entry level"
      - "AMD RTL design engineer"
      - "AMD ASIC design engineer"
      - "AMD ASIC verification engineer"
      - "AMD interconnect design engineer"
      - "AMD IP design engineer"
      - "AMD GPU ML design"
      - "AMD masters hardware engineering intern"
      - "AMD hardware engineering co-op"
      - "AMD logic design engineer"
      - "AMD microarchitecture RTL engineer"
      - "AMD FPGA engineer"
      - "AMD design verification engineer"
      - "AMD UVM verification"
      - "AMD SoC design engineer"
      - "AMD silicon validation engineer"
  - name: Intel
    ats: workday
    tenant_url: "https://intel.wd1.myworkdayjobs.com/wday/cxs/intel/External/jobs"
    portal_base: "https://intel.wd1.myworkdayjobs.com/External"
    workday_enrich_job_details: true
    workday_enrich_max: 400
