      - "Intel hardware engineer new grad"
      - "Intel ASIC design engineer"
      - "Intel design verification engineer"
  # WordPress career page (India-heavy). With united_states_only: true, most rows drop unless the title/loc signals US.
  - name: Mirafra
    ats: mirafra
    mirafra_careers_url: "https://mirafra.com/career/"
  - name: Arm
    ats: phenom
    listing_url: "https://careers.arm.com/search-jobs?acm=ALL&alrpm=ALL"
