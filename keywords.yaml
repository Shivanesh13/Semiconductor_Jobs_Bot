min_score: 1.0

united_states_only: true

us_location_indicators:
  - "United States"
  - "United States of America"
  - "USA"
  - "U.S.A."
  - "U.S."
  - "Remote - United States"
  - "Remote, United States"
  - "Remote US"
  - "US-Based"
  - "US based"
  - "United States of America (US)"

role_sort:
  intern_regex: "\\b(internship|intern|co[-\\s]?op)\\b"
  grad_regex: "\\b(ncg|new\\s+college\\s+grad|new\\s+grad|university\\s+graduate|gred|early\\s+career|rotational\\s+graduate)\\b"

exclude_title_regex:
  # Director / VP / president / principal (IC) titles are not filtered here. Firmware engineer roles are.
  - "\\bsoftware\\b"
  - "\\bfirmware\\b"
  - "\\bdft\\b"
  - "\\bphysical\\b"
  - "\\b(finance|financial\\s+analyst|corporate\\s+finance|treasury|payroll|fp&a|fp\\s*&\\s*a|investor\\s+relations)\\b"
  - "\\b(accountant|accounting|bookkeeper|internal\\s+auditor)\\b"
  - "\\b(tax\\s+manager|tax\\s+specialist)\\b"
  - "\\b(logistics|supply\\s+chain|procurement|warehouse|freight)\\b"
  - "\\b(facilities\\s+manager|office\\s+manager|workplace\\s+services)\\b"
  - "\\b(ceo|cfo|coo|cmo|chro|clo|ciso)\\b"
  - "\\b(compiler|compilers)\\s+(manager|program\\s+manager|group\\s+manager|head)\\b"
  - "\\b(manager|head)\\s*,?\\s*(of\\s+)?(the\\s+)?compilers?\\b"
  # Omit signal\\s+integrity here — digital/package SI architect roles (e.g. Qualcomm) should match.
  - "\\b(analog|mixed.signal|rf\\s+design|power\\s+electronics)\\b"
  - "\\b(mechanical|thermal|systems\\s+engineer|program\\s+manager|product\\s+manager)\\b"
  - "\\b(sales|marketing|recruiter|hr\\s+|human\\s+resources|legal\\s+counsel)\\b"

# Do not count performance_modeling toward score for these employers (avoids “performance” noise from launch/ops, etc.).
skip_performance_track_for_companies:
  - "xAI"
  - "Tesla"

